<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Breviario ZTE - Guida in tasca per promoter con tracker progressi">
    <title>ZTE Breviary</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000' width='180' height='180'/><text x='90' y='100' font-family='Montserrat' font-size='60' font-weight='bold' fill='%2300C8FF' text-anchor='middle'>ZTE</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00C8FF;
            --dark: #000000;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --surface-light: #2a2a2a;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #00a84f;
            --danger: #c41e3a;
        }

        html, body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
        }

        .login-screen.hidden {
            display: none;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--surface-light);
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0, 200, 255, 0.1);
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, #00a8d8 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: var(--dark);
            margin: 0 auto 30px;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.3);
        }

        .login-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(90deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface-light);
            border: 1px solid var(--surface-light);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--primary) 0%, #00a8d8 100%);
            border: none;
            border-radius: 8px;
            color: var(--dark);
            font-weight: 700;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 200, 255, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-error {
            display: none;
            padding: 12px;
            background: rgba(196, 30, 58, 0.1);
            border: 1px solid var(--danger);
            border-radius: 6px;
            color: var(--danger);
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
        }

        .login-error.show {
            display: block;
            animation: shake 0.4s ease;
        }

        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25% { opacity: 0.3; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Main App */
        .app {
            display: none;
            flex: 1;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .app.active {
            display: flex;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--dark) 0%, #1a1a1a 100%);
            padding: 16px;
            border-bottom: 2px solid var(--primary);
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 200, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--dark);
            font-size: 16px;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .user-badge {
            background: rgba(0, 200, 255, 0.2);
            padding: 6px 10px;
            border-radius: 4px;
            color: var(--primary);
            font-weight: 600;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: rgba(196, 30, 58, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(196, 30, 58, 0.2);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .view {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: auto;
            scroll-behavior: smooth;
        }

        .view.active {
            display: flex;
        }

        /* Home View */
        .search-section {
            padding: 20px 16px;
            background: linear-gradient(180deg, var(--surface) 0%, transparent 100%);
            border-bottom: 1px solid var(--surface-light);
            flex-shrink: 0;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .search-input {
            flex: 1;
            background: var(--surface-light);
            border: 1px solid var(--surface-light);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.3);
        }

        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 8px 14px;
            background: var(--surface-light);
            border: 1px solid var(--surface-light);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary);
            color: var(--dark);
            border-color: var(--primary);
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--surface-light);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:hover {
            background: var(--surface-light);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
            transform: translateY(-2px);
        }

        .product-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--primary);
        }

        .product-target {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .product-meta {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .badge {
            background: rgba(0, 200, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            border-left: 2px solid var(--primary);
        }

        /* Detail View */
        .detail-view {
            overflow-y: auto;
        }

        .detail-header {
            padding: 20px 16px;
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-light) 100%);
            border-bottom: 1px solid var(--surface-light);
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .product-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .product-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .detail-content {
            padding: 16px;
        }

        .spec-section {
            margin-bottom: 24px;
        }

        .spec-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .spec-item {
            background: var(--surface);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .spec-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        .spec-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .feature-list {
            background: var(--surface);
            border-left: 3px solid var(--primary);
            padding: 16px;
            border-radius: 8px;
        }

        .feature-item {
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
            padding-left: 12px;
            border-left: 2px solid rgba(0, 200, 255, 0.3);
        }

        .selling-tips {
            background: rgba(0, 200, 255, 0.08);
            border: 1px solid rgba(0, 200, 255, 0.2);
            padding: 14px;
            border-radius: 8px;
            margin-top: 16px;
        }

        .tip-text {
            font-size: 13px;
            line-height: 1.6;
        }

        /* Quiz View */
        .quiz-view {
            overflow-y: auto;
        }

        .quiz-progress {
            padding: 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--surface-light);
        }

        .progress-bar {
            height: 4px;
            background: var(--surface-light);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, #00a8d8 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        .quiz-content {
            padding: 20px 16px;
        }

        .question {
            margin-bottom: 24px;
        }

        .question-number {
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: var(--surface);
            border: 1px solid var(--surface-light);
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Montserrat', sans-serif;
        }

        .option:hover {
            border-color: var(--primary);
            background: var(--surface-light);
        }

        .option.selected {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--dark);
            font-weight: 600;
        }

        .results {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #00a8d8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 200, 255, 0.3);
        }

        .results-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .results-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .sync-message {
            font-size: 12px;
            margin-top: 16px;
            padding: 10px;
            background: rgba(0, 200, 255, 0.1);
            border-radius: 6px;
            color: var(--primary);
        }

        /* Tracker View */
        .tracker-view {
            overflow-y: auto;
            padding: 16px;
        }

        .tracker-card {
            background: var(--surface);
            border: 1px solid var(--surface-light);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .tracker-stat {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-box {
            background: var(--surface-light);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            border-left: 3px solid var(--primary);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-item {
            background: var(--surface-light);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--primary);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Buttons */
        .btn {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--dark);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 200, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--surface-light);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* Nav Bar */
        .nav-bar {
            display: flex;
            background: var(--surface);
            border-top: 1px solid var(--surface-light);
            gap: 0;
            flex-shrink: 0;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-top: 2px solid transparent;
        }

        .nav-btn.active {
            color: var(--primary);
            border-top-color: var(--primary);
        }

        .nav-icon {
            font-size: 20px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            text-align: center;
        }
    
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .header-left {
                gap: 8px;
            }
            
            .header h1 {
                font-size: 14px;
            }
            
            .logo {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
            
            .user-info {
                gap: 6px;
                font-size: 11px;
            }
            
            .user-badge {
                padding: 4px 8px;
                max-width: 100px;
            }
            
            .logout-btn {
                padding: 4px 8px;
                font-size: 10px;
                white-space: nowrap;
            }
        }
        
        @media (max-width: 480px) {
            .header-left h1 {
                display: none;
            }
            
            .user-info {
                gap: 4px;
            }
            
            .user-badge {
                max-width: 80px;
            }
        }

        </style>
</head>
<body>
    <!-- Login Screen -->
        <div class="login-screen" id="loginScreen">

        // Login
        async function handleLogin(e) {
            e.preventDefault();
            const pin = document.getElementById('pinInput').value;
            const btn = document.getElementById('loginBtn');
            
            if (!pin) {
                showLoginError('Inserisci il PIN');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Accedi ' + '<span class="loading"></span>';

            try {
                if (!isOnline) {
                    // Offline: usa lista locale
                    showLoginError('Connessione richiesta per il primo accesso');
                    btn.disabled = false;
                    btn.textContent = 'Accedi';
                    return;
                }

                // Online: valida con Google Apps Script
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL + '?action=validatePin&pin=' + encodeURIComponent(pin), {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.valid) {
                    currentUser = {
                        pin: data.promoter.pin,
                        nome: data.promoter.nome,
                        cognome: data.promoter.cognome,
                        negozio: data.promoter.negozio,
                        loginTime: new Date().toISOString()
                    };
                    localStorage.setItem('zte_user', JSON.stringify(currentUser));
                    showApp();
                    renderProducts();
                    setupFilters();
                    setupSearch();
                    loadTrackerStats();
                } else {
                    showLoginError('PIN non valido');
                    document.getElementById('pinInput').value = '';
                }
            } catch (error) {
                showLoginError('Errore di connessione. Riprova.');
                console.error('Login error:', error);
            }

            btn.disabled = false;
            btn.textContent = 'Accedi';
        }

        // Quiz
        function showQuizQuestion() {
            if (currentQuizIndex >= quizQuestions.length) {
                showQuizResults();
                return;
            }

            const q = quizQuestions[currentQuizIndex];
            const container = document.getElementById('quizContainer');
            const progress = ((currentQuizIndex) / quizQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Domanda ${currentQuizIndex + 1} di ${quizQuestions.length}`;

            container.innerHTML = `
                <div class="quiz-content">
                    <div class="question">
                        <div class="question-number">Domanda ${currentQuizIndex + 1}</div>
                        <div class="question-text">${q.q}</div>
                        <div class="options">
                            ${q.options.map((opt, i) => `
                                <div class="option" onclick="selectAnswer(${i})">${opt}</div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                <div style="padding: 0 16px 16px; margin-top: 16px;">
                    <button class="btn btn-primary" id="nextBtn" disabled onclick="nextQuestion()" style="width: 100%;">Continua</button>
                </div>
            `;

            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    quizAnswers[currentQuizIndex] = i;
                    document.getElementById('nextBtn').disabled = false;
                });
            });
        }

        function selectAnswer(index) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            document.querySelectorAll('.option')[index].classList.add('selected');
            quizAnswers[currentQuizIndex] = index;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            // Se siamo oltre l'ultimo indice, mostra risultati
            if (currentQuizIndex >= quizQuestions.length) {
                showQuizResults();
                return;
            }
            
            // Mostra feedback della risposta corrente
            const currentAnswer = quizAnswers[currentQuizIndex];
            const correctAnswer = quizQuestions[currentQuizIndex].correct;
            
            // Se ha risposto
            if (currentAnswer !== undefined) {
                const options = document.querySelectorAll('.option');
                
                // Colora la risposta corretta in VERDE
                options[correctAnswer].style.background = '#00C800';
                options[correctAnswer].style.color = '#fff';
                options[correctAnswer].style.borderColor = '#00C800';
                
                // Se ha sbagliato, colora la sua risposta in ROSSO
                if (currentAnswer !== correctAnswer) {
                    options[currentAnswer].style.background = '#C80000';
                    options[currentAnswer].style.color = '#fff';
                    options[currentAnswer].style.borderColor = '#C80000';
                }
                
                // Disabilita click su opzioni
                options.forEach(opt => opt.style.pointerEvents = 'none');
            }
            
            // Aspetta 1.5 secondi prima di andare alla prossima domanda
            setTimeout(() => {
                currentQuizIndex++;
                showQuizQuestion();
            }, 1500);
        }

        async function showQuizResults() {
            // ⛔ PREVIENI SALVATAGGI MULTIPLI
            if (quizSubmitted) return;
            quizSubmitted = true;
            
            const correct = quizAnswers.filter((ans, i) => ans === quizQuestions[i].correct).length;
            const percentage = Math.round((correct / quizQuestions.length) * 100);
            
            // Salva localmente
            saveQuizResultLocal(percentage, correct);

            // Prova a sincronizzare con Google Sheet
            let syncMsg = '';
            if (isOnline) {
                try {
                    await saveQuizResultToSheet(percentage, correct);
                    syncMsg = '✅ Risultato salvato online';
                } catch (e) {
                    console.log('Sync offline:', e);
                    syncMsg = '📱 Salvato localmente (sincronizzerai online)';
                }
            } else {
                syncMsg = '📱 Salvato localmente (sincronizzerai online)';
            }

            // MOSTRA LA RESULTS SCREEN
            const quizScreen = document.getElementById('quizScreen');
            const resultsScreen = document.getElementById('resultsScreen');
            
            if (quizScreen) quizScreen.style.display = 'none';
            if (resultsScreen) resultsScreen.style.display = 'block';
            
            // POPOLA I DATI
            document.getElementById('finalScore').textContent = percentage + '%';
            document.getElementById('finalSubtitle').textContent = correct + ' su ' + quizQuestions.length + ' risposte corrette';
            document.getElementById('finalSyncMsg').textContent = syncMsg;
            
            // Badge e titolo
            let badge = '⭐';
            let title = '🎉 Eccellente!';
            if (percentage < 80 && percentage >= 60) {
                badge = '🟦';
                title = '👍 Buono!';
            } else if (percentage < 60) {
                badge = '🔴';
                title = '📚 Continua a studiare';
            }
            document.getElementById('finalBadge').textContent = badge;
            document.getElementById('finalTitle').textContent = title;
            
            // Genera il summary degli errori
            const wrongAnswers = quizAnswers.map((ans, i) => ({
                idx: i + 1,
                question: quizQuestions[i].q,
                yourAnswer: ans !== undefined ? quizQuestions[i].options[ans] : 'Non risposto',
                correctAnswer: quizQuestions[i].options[quizQuestions[i].correct],
                isWrong: ans !== quizQuestions[i].correct
            })).filter(a => a.isWrong);
            
            const errorDiv = document.getElementById('finalErrorSummary');
            if (wrongAnswers.length > 0) {
                errorDiv.innerHTML = `<h4 style="color: #C80000; margin-bottom: 15px; font-size: 14px;">❌ RISPOSTE SBAGLIATE:</h4>` +
                    wrongAnswers.map(w => `
                        <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(200,0,0,0.2);">
                            <div style="color: #888; font-size: 12px; margin-bottom: 5px;">Domanda ${w.idx}</div>
                            <div style="color: #fff; font-size: 13px; margin-bottom: 8px;">${w.question}</div>
                            <div style="background: rgba(200,0,0,0.2); padding: 8px; border-radius: 6px; margin-bottom: 5px;">
                                <div style="color: #C80000; font-size: 12px;">❌ La tua risposta: ${w.yourAnswer}</div>
                            </div>
                            <div style="background: rgba(0,200,0,0.2); padding: 8px; border-radius: 6px;">
                                <div style="color: #00C800; font-size: 12px;">✅ Risposta corretta: ${w.correctAnswer}</div>
                            </div>
                        </div>
                    `).join('');
            } else {
                errorDiv.innerHTML = '<div style="text-align: center; color: #00C800; font-weight: 600; padding: 15px;">✅ Perfetto! Hai risposto correttamente a tutte le domande!</div>';
            }
        }

        function saveQuizResultLocal(percentage, correct) {
            let history = JSON.parse(localStorage.getItem(`zte_history_${currentUser.pin}`) || '[]');
            history.push({
                date: new Date().toLocaleString('it-IT'),
                score: percentage,
                correct: correct,
                total: quizQuestions.length
            });
            localStorage.setItem(`zte_history_${currentUser.pin}`, JSON.stringify(history));

        async function saveQuizResultToSheet(percentage, correct) {
            const data = {
                pin: currentUser.pin,
                nome: currentUser.nome,
                cognome: currentUser.cognome,
                negozio: currentUser.negozio,
                score: percentage,
                correct: correct,
                total: quizQuestions.length
            };

            const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: 'POST',
                payload: JSON.stringify({
                    action: 'saveQuizResult',
                    data: data
                })
            });

            return response.json();
        }

        // Tracker
        function loadTrackerStats() {
            const history = JSON.parse(localStorage.getItem(`zte_history_${currentUser.pin}`) || '[]');
            
            if (history.length === 0) {
                document.getElementById('totalTests').textContent = '0';
                document.getElementById('avgScore').textContent = '0%';
                document.getElementById('historyList').innerHTML = '<p style="font-size: 12px; color: var(--text-secondary); text-align: center; padding: 20px;">Nessun quiz completato ancora</p>';
                return;
            }

            const avg = Math.round(history.reduce((a, b) => a + b.score, 0) / history.length);
            
            // Calcola i badge conquistati
            const expertCount = history.filter(h => h.score >= 80).length;
            const proCount = history.filter(h => h.score >= 60 && h.score < 80).length;
            const rookieCount = history.filter(h => h.score < 60).length;

            document.getElementById('totalTests').textContent = history.length;
            document.getElementById('avgScore').textContent = avg + '%';

            document.getElementById('historyList').innerHTML = history.reverse().map(h => `
                <div class="history-item">
                    <span>${h.date}</span>
                    <span style="color: var(--primary); font-weight: 700;">${h.score}%</span>
                </div>
            `).join('');
        }

                button.textContent = tag;
                button.style.cssText = 'padding: 8px 16px; border: 2px solid #00C8FF; background: transparent; color: #00C8FF; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.3s ease;';
                button.onclick = (e) => {
                    e.preventDefault();
                    toggleTag(tag, button);
                };
                tagsContainer.appendChild(button);
            });
            
            const resetBtn = document.createElement('button');
            resetBtn.textContent = '🔄 RESET';
            resetBtn.style.cssText = 'padding: 8px 16px; border: 2px solid #888; background: transparent; color: #888; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.3s ease;';
            resetBtn.onclick = () => resetFilters();
            tagsContainer.appendChild(resetBtn);

            // Assegna attributi ai prodotti
            document.querySelectorAll('[id*="neo_5_gt"], [id*="nubia_air"], [id*="v80"], [id*="blade"]').forEach((el) => {
                if (el.id.includes('neo_5_gt')) el.setAttribute('data-product-id', 'neo_5_gt');
                else if (el.id.includes('nubia_air_pro')) el.setAttribute('data-product-id', 'nubia_air_pro');
                else if (el.id.includes('nubia_air') && !el.id.includes('pro')) el.setAttribute('data-product-id', 'nubia_air');
                else if (el.id.includes('v80_pro')) el.setAttribute('data-product-id', 'v80_pro');
                else if (el.id.includes('v80_max')) el.setAttribute('data-product-id', 'v80_max');
                else if (el.id.includes('v80_vita')) el.setAttribute('data-product-id', 'v80_vita');
                else if (el.id.includes('blade_a36')) el.setAttribute('data-product-id', 'blade_a36');
            });
        }

        function toggleTag(tag, button) {
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
                button.style.background = 'transparent';
                button.style.color = '#00C8FF';
            } else {
                selectedTags.push(tag);
                button.style.background = '#00C8FF';
                button.style.color = '#000';
            }
            filterProducts();
        }

        function resetFilters() {
            selectedTags = [];
            filterProducts();
            document.querySelectorAll('.tag-filter-btn').forEach(btn => {
                btn.style.background = 'transparent';
                btn.style.color = '#00C8FF';
            });
        }

        function filterProducts() {
            const products = document.querySelectorAll('[data-product-id]');
            products.forEach(product => {
                const productId = product.getAttribute('data-product-id');
                const tags = productTags[productId] || [];
                if (selectedTags.length === 0) {
                    product.style.display = '';
                } else {
                    const hasMatch = selectedTags.some(tag => tags.includes(tag));
                    product.style.display = hasMatch ? '' : 'none';
                }
            });
        }

        // ⏸️ Filtri - aggiunti dopo il login nella sezione prodotti
    </script>

    <!-- RESULTS SCREEN -->
    <div id="resultsScreen" style="display: none; width: 100%; height: 100vh; background: #000; position: fixed; top: 0; left: 0; z-index: 1000; overflow-y: auto; padding: 20px;">
        <div style="max-width: 600px; margin: 0 auto; background: rgba(20,20,20,0.95); border: 2px solid #00C8FF; border-radius: 12px; padding: 50px 40px; text-align: center; margin-top: 40px;">
            <!-- PUNTEGGIO GRANDE -->
            <div id="finalScore" style="font-size: 100px; font-weight: 900; color: #00C8FF; margin-bottom: 20px; font-family: 'Montserrat', sans-serif;">85%</div>
            
            <!-- BADGE -->
            <div id="finalBadge" style="font-size: 48px; margin-bottom: 15px;">⭐</div>
            
            <!-- TITOLO -->
            <div id="finalTitle" style="font-size: 36px; font-weight: 800; color: #FFFFFF; margin-bottom: 15px; font-family: 'Montserrat', sans-serif;">Eccellente!</div>
            
            <!-- SOTTOTITOLO -->
            <div id="finalSubtitle" style="font-size: 20px; color: #999; margin-bottom: 40px; font-family: 'Montserrat', sans-serif;">17 su 20 risposte corrette</div>
            
            <!-- MESSAGGIO SYNC -->
            <div id="finalSyncMsg" style="background: rgba(0,200,100,0.15); border: 1px solid #00C864; border-radius: 8px; padding: 15px; margin-bottom: 40px; color: #00C864; font-size: 14px; font-family: 'Montserrat', sans-serif;">✅ Risultato salvato online</div>
            
            <!-- ERRORI -->
            <div id="finalErrorSummary" style="background: rgba(200,0,0,0.1); border: 1px solid #C80000; border-radius: 12px; padding: 25px; margin-bottom: 40px; text-align: left;"></div>
            
            <!-- PULSANTI -->
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; border-radius: 8px; background: #00C8FF; color: #000; transition: all 0.3s;" onmouseover="this.style.background='#00e0ff'" onmouseout="this.style.background='#00C8FF'" onclick="resetQuizFromResults()">🔄 Ripeti Quiz</button>
                <button class="btn btn-secondary" style="width: 100%; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; border: 1px solid #00C8FF; border-radius: 8px; background: transparent; color: #00C8FF; transition: all 0.3s;" onmouseover="this.style.background='rgba(0,200,255,0.1)'" onmouseout="this.style.background='transparent'" onclick="switchView('home')">📚 Torna al Breviario</button>
            </div>
        </div>
    </div>

</body>
</html>
